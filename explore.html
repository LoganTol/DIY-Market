<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Plans | ProPlans</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="explore-container">
        <div class="breadcrumbs">
            <a href="index.html">Home</a> &gt; Explore
        </div>
        
        <aside class="sidebar">
            <h3 style="margin-bottom: 1rem;">Filters</h3>
            <div class="filter-group">
                <h4>Search</h4>
                <input type="text" id="searchInput" placeholder="Search plans..." style="width:100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm);">
            </div>
            <div class="filter-group">
                <h4>Category</h4>
                <select id="categoryFilter" style="width:100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm);">
                    <option value="All">All Categories</option>
                    <option value="Outdoor">Outdoor</option>
                    <option value="Woodworking">Woodworking</option>
                    <option value="Structures">Structures</option>
                </select>
            </div>
            <div class="filter-group">
                <h4>Max Price <span id="priceLabel">($100)</span></h4>
                <input type="range" id="priceFilter" min="0" max="100" value="100" style="width: 100%;">
            </div>
            <div class="filter-group">
                <h4>Difficulty</h4>
                <select id="difficultyFilter" style="width:100%; padding: 0.5rem; border: 1px solid var(--border-color); border-radius: var(--radius-sm);">
                    <option value="All">All Levels</option>
                    <option value="Beginner">Beginner</option>
                    <option value="Intermediate">Intermediate</option>
                    <option value="Advanced">Advanced</option>
                </select>
            </div>
        </aside>

        <section class="explore-content">
            <div class="section-header" style="margin-bottom: 1rem;">
                <h2>Full Catalog</h2>
            </div>
            <div class="plans-grid">
                <!-- Dynamically populated via app.js -->
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <!-- Modal -->
    <div id="plan-modal" class="modal hidden">
        <div class="modal-backdrop"></div>
        <div class="modal-content">
            <button class="modal-close" id="modalClose" aria-label="Close modal"><i class="fa-solid fa-xmark"></i></button>
            <div class="modal-body">
                <div id="modal-image" class="modal-image-preview"></div>
                <div class="modal-info">
                    <h2 id="modal-title"></h2>
                    <p><strong>Dimensions:</strong> <span id="modal-dimensions"></span></p>
                    <h3>Material List</h3>
                    <ul id="modal-materials-list"></ul>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js" defer></script>
</body>
</html>
